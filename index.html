<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>American BOA - The Unity Jar</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<h1>AMERICAN BOA: THE ATTENDANCE WARS<h1>
<p>Daily updates. Podium & MVP status awarded every 7 chips earned.</p>
</header>
<section class="podium-area">
<div class="podium-container">
<div class="place second">
<div class="rank">2nd</div>
<div id="podium-2-names" class="podium-names-list"></div>
<div class="podium-base"></div>
</div>
<div class="place first">
<div class="rank">MVP</div>
<div id="podium-1-names" class="podium-names-list"></div>
<div class="podium-base"></div>
</div>
<div class="place third">
<div class="rank">3rd</div>
<div id="podium-3-names" class="podium-names-list"></div>
<div class="podium-base"></div>
</div>
</div>
</section>
<div class="main-display">
<section class="jar-viewer">
<h2> JAR PROGRESS</h2>
<div class="glass-jar">
<div class="liquid-fill" id="jarFill"></div>
<div class="goal-line">PRIZE: FOOD TRUCK LUNCH</div>
</div>
<div class="stats-box">
<p>Total Chips: <span id="totalChips">0</span></p>
</div>
</section>
<section class="team-viewer">
<h2>TEAM STANDINGS</h2>
<div class="team-grid" id="teamGrid"></div>
</section>
</div>
<script src="script.js"></script>
</body>
</html>
